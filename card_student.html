<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h2, h1, p {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        .btn {
            padding: 5px 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .remove {
            background: red;
            color: white;
        }

        .total {
            text-align: right;
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .checkout {
            background: green;
            color: white;
            padding: 10px;
            width: 100%;
            margin-top: 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Added content here -->
        <h1>Welcome</h1>
        <p>Cart System V</p>

        <h2>Your Shopping Cart</h2>

        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price ($)</th>
                    <th>Quantity</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="cart-items">
                <tr>
                    <td>Phone</td>
                    <td class="price">200</td>
                    <td>1</td>
                    <td><button class="btn remove" onclick="removeItem(this)">Remove</button></td>
                </tr>

                <tr>
                    <td>Headphones</td>
                    <td class="price">50</td>
                    <td>2</td>
                    <td><button class="btn remove" onclick="removeItem(this)">Remove</button></td>
                </tr>
            </tbody>
        </table>

        <div class="total">
            Total: $<span id="total">0</span>
        </div>

        <button class="checkout">Checkout</button>
    </div>

    <script>
        function calculateTotal() {
            let prices = document.querySelectorAll(".price");
            let total = 0;

            prices.forEach(p => {
                total += parseFloat(p.innerText);
            });

            document.getElementById("total").innerText = total;
        }

        function removeItem(btn) {
            let row = btn.parentElement.parentElement;
            row.remove();
            calculateTotal();
        }

        calculateTotal();
    </script>

</body>

</html>
